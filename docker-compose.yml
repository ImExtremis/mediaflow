# ================================================================
# MediaFlow · Complete Arr-Stack + Custom Dashboard
# ================================================================
# Services: Sonarr · Radarr · Prowlarr · qBittorrent · Jellyfin
#           MediaFlow Backend API · MediaFlow Frontend Dashboard
# ================================================================

networks:
  mediaflow_net:
    driver: bridge

volumes:
  sonarr_config:
  radarr_config:
  prowlarr_config:
  qbittorrent_config:
  jellyfin_config:
  jellyfin_cache:
  bazarr_config:
  sonarr_anime_config:
  overseerr_config:
  tdarr_config:
  tdarr_server_config:


services:

  # ── Sonarr (TV Shows) ────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: mediaflow_sonarr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - sonarr_config:/config
      - ./data:/data
    ports:
      - "${SONARR_PORT:-8989}:8989"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8989/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Radarr (Movies) ─────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: mediaflow_radarr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - radarr_config:/config
      - ./data:/data
    ports:
      - "${RADARR_PORT:-7878}:7878"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7878/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Prowlarr (Indexer Manager) ───────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: mediaflow_prowlarr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - prowlarr_config:/config
      - ./data:/data
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9696/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── qBittorrent (Download Client) ───────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mediaflow_qbittorrent
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - qbittorrent_config:/config
      # Map the data directory exactly the same across all services to prevent "bad remote path mapping" errors
      - ./data:/data
      # Pre-configured settings – disables host-header check, fixes "Unauthorized"
      - ./config/qBittorrent.conf:/config/qBittorrent/qBittorrent.conf:ro
    ports:
      - "${QBIT_PORT:-8082}:8080"
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Jellyfin (Media Server) ──────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: mediaflow_jellyfin
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ./data/media:/data/media:ro
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
      - "7359:7359/udp" # local network discovery
      - "1900:1900/udp" # DLNA
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8096/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Bazarr (Subtitles) ───────────────────────────────────────
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: mediaflow_bazarr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - bazarr_config:/config
      - ./data/media:/data/media
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6767/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Sonarr Anime (Anime TV Shows) ────────────────────────────
  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: mediaflow_sonarr_anime
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - sonarr_anime_config:/config
      - ./data:/data
    ports:
      - "${SONARR_ANIME_PORT:-8990}:8989"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8989/ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Overseerr (Media Requests) ───────────────────────────────
  overseerr:
    image: sctx/overseerr:latest
    container_name: mediaflow_overseerr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
    volumes:
      - overseerr_config:/app/config
    ports:
      - "${OVERSEERR_PORT:-5055}:5055"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5055/api/v1/status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Tdarr (Auto Transcoding) ─────────────────────────────────
  tdarr:
    image: haveagitgat/tdarr:latest
    container_name: mediaflow_tdarr
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - PUID=${PUID:-999}
      - PGID=${PGID:-987}
      - TZ=${TZ:-America/New_York}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    volumes:
      - tdarr_server_config:/app/server
      - tdarr_config:/app/configs
      - ./data/media:/media
      - ./data/transcode_cache:/temp
    ports:
      - "${TDARR_UI_PORT:-8265}:8265"
      - "${TDARR_SERVER_PORT:-8266}:8266"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8265" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MediaFlow Backend API (Node.js / Express) ────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediaflow_backend
    restart: unless-stopped
    networks:
      - mediaflow_net
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${BACKEND_PORT:-3001}
      - TZ=${TZ:-America/New_York}
      - SONARR_URL=http://sonarr:8989
      - RADARR_URL=http://radarr:7878
      - PROWLARR_URL=http://prowlarr:9696
      - QBIT_URL=http://qbittorrent:8080
      - JELLYFIN_URL=http://jellyfin:8096
      - BAZARR_URL=http://bazarr:6767
      - SONARR_ANIME_URL=http://sonarr-anime:8989
      - OVERSEERR_URL=http://overseerr:5055
      - TDARR_URL=http://tdarr:8265
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - QBIT_USER=${QBIT_USER:-admin}
      - QBIT_PASS=${QBIT_PASS:-adminpassword}
    volumes:
      - ./config:/app/config
      - ./data:/data:ro
    depends_on:
      - sonarr
      - radarr
      - prowlarr
      - qbittorrent
      - jellyfin
      - bazarr
      - sonarr-anime
      - overseerr
      - tdarr

  # ── MediaFlow Frontend Dashboard (Nginx + React) ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediaflow_frontend
    restart: unless-stopped
    networks:
      - mediaflow_net
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      - backend
    environment:
      - TZ=${TZ:-America/New_York}
